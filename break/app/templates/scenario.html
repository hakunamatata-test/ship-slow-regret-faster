<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ scenario.title }} — Workshop Demo</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.35rem; margin-bottom: 0.5rem; }
    p { color: #444; margin-bottom: 1rem; }
    a { color: #06c; }
    label { display: block; margin-bottom: 0.35rem; font-weight: 500; }
    input[type="text"], textarea { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; font: inherit; }
    textarea { min-height: 120px; resize: vertical; }
    button { padding: 0.5rem 1rem; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; font: inherit; }
    button:hover { background: #555; }
    .panel { margin-top: 1.5rem; padding: 1rem; background: #f8f8f8; border-radius: 8px; border: 1px solid #eee; }
    .panel h3 { margin: 0 0 0.5rem 0; font-size: 1rem; }
    .output { white-space: pre-wrap; word-break: break-word; font-size: 0.9rem; }
    .log { font-size: 0.85rem; color: #555; white-space: pre-wrap; }
    .error { color: #c00; }
    .hint { font-size: 0.9rem; color: #666; margin: 0 0 0.5rem 0; }
    .chat-container { margin-bottom: 1rem; border: 1px solid #eee; border-radius: 8px; min-height: 160px; max-height: 320px; overflow-y: auto; background: #fafafa; }
    .chat-message { padding: 0.6rem 0.9rem; margin: 0.5rem; border-radius: 8px; max-width: 90%; white-space: pre-wrap; word-break: break-word; font-size: 0.9rem; }
    .chat-message.user { background: #e3f2fd; margin-left: auto; width: fit-content; }
    .chat-message.assistant { background: #f5f5f5; width: fit-content; }
  </style>
</head>
<body>
  <p><a href="/">← Back to scenarios</a></p>
  <h1>{{ scenario.title }}</h1>
  <p>{{ scenario.description }}</p>

  {% if scenario.id == 1 %}
  <div id="chat-container" class="chat-container">
    <div id="chat-messages"></div>
  </div>
  <label for="input">Message</label>
  <input type="text" id="input" name="input" placeholder="Type a message..." autocomplete="off" />
  {% elif scenario.id == 2 %}
  <label for="document">Document text</label>
  <p class="hint">Example (normal use): paste the text below, then Summarize. Change the config and check the log.</p>
  <textarea id="document" name="document" rows="10">Q4 sales report. Revenue was strong in all regions.

CONFIG_START
format=bullets
output_level=2
CONFIG_END</textarea>
  {% elif scenario.id == 3 %}
  <label for="input">Task</label>
  <input type="text" id="input" name="input" placeholder="e.g. Investigate customer 123. Try 'full report' and check the log." />
  {% endif %}

  <button type="button" id="run">{% if scenario.id == 2 %}Summarize Document{% else %}Run{% endif %}</button>

  <div class="panel" id="output-panel" style="display: none;">
    <h3>Output</h3>
    <div class="output" id="output"></div>
  </div>
  <div class="panel" id="log-panel" style="display: none;">
    <h3>Log</h3>
    <div class="log" id="log"></div>
  </div>

  <script>
    const scenarioId = {{ scenario.id }};
    const runBtn = document.getElementById('run');
    const outputPanel = document.getElementById('output-panel');
    const logPanel = document.getElementById('log-panel');
    const outputEl = document.getElementById('output');
    const logEl = document.getElementById('log');

    // Scenario 1: chat history for multi-turn (vuln only after capability discovery).
    let conversationHistory = [];
    let lastLog = [];

    function getPayload() {
      if (scenarioId === 2) {
        return { document: document.getElementById('document').value };
      }
      if (scenarioId === 1) {
        return { input: document.getElementById('input').value, history: conversationHistory };
      }
      return { input: document.getElementById('input').value };
    }

    function renderChat() {
      const container = document.getElementById('chat-messages');
      if (!container) return;
      container.innerHTML = conversationHistory.map(m => {
        const div = document.createElement('div');
        div.className = 'chat-message ' + m.role;
        div.textContent = m.content || '';
        return div.outerHTML;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    runBtn.addEventListener('click', async () => {
      const inputEl = document.getElementById('input');
      const currentInput = scenarioId === 1 ? inputEl.value.trim() : (scenarioId === 2 ? document.getElementById('document')?.value?.trim() : inputEl.value.trim());
      if (scenarioId === 1 && !currentInput) return;

      runBtn.disabled = true;
      outputPanel.style.display = 'none';
      logPanel.style.display = 'none';
      try {
        const res = await fetch('/api/scenario/' + scenarioId, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getPayload())
        });
        const data = await res.json();

        if (scenarioId === 1) {
          conversationHistory.push({ role: 'user', content: currentInput });
          let assistantContent = data.message || '';
          if (data.selected_tool) assistantContent = 'Tool: ' + data.selected_tool + '\n\n' + assistantContent;
          if (data.metadata && Object.keys(data.metadata).length) assistantContent += '\n\nMetadata: ' + JSON.stringify(data.metadata);
          conversationHistory.push({ role: 'assistant', content: assistantContent });
          lastLog = data.log || [];
          renderChat();
          if (inputEl) inputEl.value = '';
          if (lastLog.length) {
            logEl.textContent = lastLog.join('\n');
            logPanel.style.display = 'block';
          }
          outputPanel.style.display = 'none';
        } else {
          if (scenarioId === 2) {
            outputEl.textContent = data.summary || '';
          } else {
            outputEl.textContent = data.summary || '';
            if (data.exfiltrated) outputEl.textContent += '\n\n(Report was also sent to the requested endpoint.)';
          }
          if (data.log && data.log.length) {
            logEl.textContent = data.log.join('\n');
            logPanel.style.display = 'block';
          }
          outputPanel.style.display = 'block';
        }
      } catch (e) {
        outputEl.textContent = 'Error: ' + e.message;
        outputEl.className = 'output error';
        outputPanel.style.display = 'block';
      }
      runBtn.disabled = false;
    });
  </script>
</body>
</html>
