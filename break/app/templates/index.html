<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop Demo</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #444; margin-bottom: 1.5rem; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { margin-bottom: 1rem; }
    a { display: block; padding: 1rem; background: #f0f0f0; border-radius: 8px; text-decoration: none; color: #111; }
    a:hover { background: #e0e0e0; }
    a strong { display: block; margin-bottom: 0.25rem; }
    a span { font-size: 0.9rem; color: #555; }
  </style>
</head>
<body>
  <h1>Workshop Demo</h1>
  <p>Choose a scenario to explore. Each has an input area and a run button.</p>
  <ul>
    {% for s in scenarios %}
    <li>
      <a href="/scenario/{{ s.id }}">
        <strong>{{ s.title }}</strong>
        <span>{{ s.description }}</span>
      </a>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
